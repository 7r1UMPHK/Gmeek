<style>
:root{
    --tag-bg: rgba(255,255,255,0.72);
    --tag-bg-dark: rgba(22,27,34,0.72);
    --tag-border: rgba(31,35,40,0.12);
    --tag-shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
}
body{
    box-sizing:border-box;
    min-width:200px;
    max-width:1100px;
    margin:24px auto;
    padding:28px;
    font-size:16px;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    line-height:1.55;
    color:var(--fgColor-default, #24292f);
}
#header{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
    padding:14px 14px 16px;
    border:1px solid var(--tag-border);
    border-radius:14px;
    background:var(--tag-bg);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    box-shadow:var(--tag-shadow);
    margin-bottom:14px;
}
#content{
    border:1px solid var(--tag-border);
    border-radius:14px;
    background:var(--tag-bg);
    box-shadow:var(--tag-shadow);
    padding:14px;
}
#footer{
    margin-top:40px;
    text-align:center;
    font-size:13px;
    color:var(--fgColor-muted, #57606a);
}

[data-color-mode="dark"] #header,
[data-color-mode="dark"] #content{
    background:var(--tag-bg-dark);
}

<script>
tagList=[];
labelsCount={};
jsonData='';
let searchIndexMap={};
let searchIndexReady=false;
let searchIndexBuildingPromise=null;
const PAGE_SIZE = 15;
let currentPage = 1;
let requestJson="postList.json"
let request=new XMLHttpRequest();
request.open("GET",requestJson);
request.responseType='text';
request.send();
request.onload=function(){
    jsonData=JSON.parse(request.response);
    console.log(jsonData);
    showList(labelsCount);
    setClassDisplay(decodeURI(window.location.hash.slice(1)));
}

window.addEventListener("hashchange", function(){
    setClassDisplay(decodeURI(window.location.hash.slice(1)));
});

function showList(labelsCount){
    let SideNav=document.getElementsByClassName("SideNav")[0];
    SideNav.classList.add("border");
    let taglabel=document.getElementById("taglabel");

    jsonData['labelColorDict']["All"]="#000";
    labelsCount["All"]=0;
    for (let key in jsonData) {
        if (key !== 'labelColorDict' && Array.isArray(jsonData[key]['labels'])) {
            labelsCount["All"]++;
            for (let label of jsonData[key]['labels']) {
                labelsCount[label] = (labelsCount[label] || 0) + 1;
            }
        }
    }

    let sortedLabelsList = Object.keys(labelsCount).sort((a, b) => labelsCount[b] - labelsCount[a]);
    for (let label of sortedLabelsList) {
        tagList.push(label);
        let showLabels = document.createElement("button");
        showLabels.setAttribute("class", "Label");
        showLabels.setAttribute("style", "background-color:" + jsonData['labelColorDict'][label]+";padding:4px;");
        showLabels.innerHTML="&nbsp;&nbsp;"+label+" ";
        showLabels.setAttribute("onclick", "javascript:updateShowTag('" + label + "');");

        let LabelNum=document.createElement("span");
        LabelNum.setAttribute("class","Counter");
        LabelNum.innerHTML=labelsCount[label];
        showLabels.appendChild(LabelNum);
        taglabel.appendChild(showLabels);
    }

    for(i in jsonData){
        if(i!='labelColorDict'){
            let div=document.createElement("div");
            div.setAttribute("class","lists "+jsonData[i]['labels'].join(" "));
            div.setAttribute("data-post-key", i);
            let item=document.createElement("a");
            item.setAttribute("class","SideNav-item d-flex flex-items-center flex-justify-between");
            item.setAttribute("href",jsonData[i]['postUrl']);

            let center=document.createElement("div");
            center.setAttribute("class","d-flex flex-items-center");

            svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
            path=document.createElementNS("http://www.w3.org/2000/svg","path"); 
            span=document.createElement("span");
            svg.setAttributeNS(null,"class","SideNav-icon octicon");
            svg.setAttributeNS(null,"style","width:16px;height:16px");
            path.setAttributeNS(null, "d", IconList["post"]);
            svg.appendChild(path);

            let title=document.createElement("span");
            title.setAttribute("class","listTitle");
            title.setAttribute("data-raw-title", jsonData[i]['postTitle']);
            title.textContent=jsonData[i]['postTitle'];

            let snippet=document.createElement("span");
            snippet.setAttribute("class","listSnippet");
            snippet.setAttribute("data-raw-snippet","");

            let textWrap=document.createElement("div");
            textWrap.setAttribute("class","listTextWrap");
            textWrap.appendChild(title);
            textWrap.appendChild(snippet);

            center.appendChild(svg);
            center.appendChild(textWrap);

            let listLabels=document.createElement("div");
            listLabels.setAttribute("class","listLabels");
            
            for(label of jsonData[i]['labels']){
                let LabelName=document.createElement("span");
                LabelName.setAttribute("class","Label LabelName");
                LabelName.setAttribute("style","background-color:"+jsonData['labelColorDict'][label]);
                LabelName.innerHTML=label;
                listLabels.appendChild(LabelName);
            }
            let LabelTime=document.createElement("span");
            LabelTime.setAttribute("class","Label LabelTime");
            LabelTime.setAttribute("style","background-color:"+jsonData[i]['dateLabelColor']);
            LabelTime.innerHTML=jsonData[i]['createdDate'];
            listLabels.appendChild(LabelTime);

            item.appendChild(center);
            item.appendChild(listLabels);
            div.appendChild(item);
            SideNav.appendChild(div);
        }
    }
}

function renderPagination(totalItems){
    const pagination = document.getElementById("pagination");
    if(!pagination){return;}

    const totalPages = Math.ceil(totalItems / PAGE_SIZE);
    if(totalItems === 0 || totalPages <= 1){
        pagination.style.display = "none";
        pagination.innerHTML = "";
        return;
    }

    pagination.style.display = "flex";
    pagination.innerHTML = "";

    const prevBtn = document.createElement("button");
    prevBtn.setAttribute("class", "page-btn");
    prevBtn.textContent = "上一页";
    prevBtn.disabled = currentPage === 1;
    if(prevBtn.disabled){prevBtn.style.opacity = "0.5";}
    prevBtn.onclick = function(){ if(currentPage > 1){ goPage(currentPage - 1); } };
    pagination.appendChild(prevBtn);

    for(let p = 1; p <= totalPages; p++){
        if(totalPages > 9 && p !== 1 && p !== totalPages && Math.abs(p - currentPage) > 1){
            if((p === 2 && currentPage > 4) || (p === totalPages - 1 && currentPage < totalPages - 3)){
                const dots = document.createElement("span");
                dots.textContent = "...";
                pagination.appendChild(dots);
            }
            continue;
        }

        const btn = document.createElement("button");
        btn.setAttribute("class", "page-btn" + (p === currentPage ? " active" : ""));
        btn.textContent = p;
        btn.onclick = function(){ goPage(p); };
        pagination.appendChild(btn);
    }

    const nextBtn = document.createElement("button");
    nextBtn.setAttribute("class", "page-btn");
    nextBtn.textContent = "下一页";
    nextBtn.disabled = currentPage === totalPages;
    if(nextBtn.disabled){nextBtn.style.opacity = "0.5";}
    nextBtn.onclick = function(){ if(currentPage < totalPages){ goPage(currentPage + 1); } };
    pagination.appendChild(nextBtn);
}

function applyPagination(){
    const lists = document.getElementsByClassName("lists");
    const matched = [];

    for(let i = 0; i < lists.length; i++){
        if(lists[i].dataset.match === "1"){
            matched.push(lists[i]);
        }else{
            lists[i].style.display = "none";
        }
    }

    const totalItems = matched.length;
    const totalPages = Math.max(1, Math.ceil(totalItems / PAGE_SIZE));
    if(currentPage > totalPages){ currentPage = totalPages; }

    const start = (currentPage - 1) * PAGE_SIZE;
    const end = start + PAGE_SIZE;

    for(let i = 0; i < matched.length; i++){
        matched[i].style.display = (i >= start && i < end) ? "block" : "none";
    }

    renderPagination(totalItems);
}

function goPage(page){
    currentPage = page;
    applyPagination();
    window.scrollTo({ top: 0, behavior: "smooth" });
}

function updateShowTag(label){
    if(window.location.hash.slice(1)!=encodeURI(label)){
        window.location.hash="#"+(label);
        setClassDisplay(label);
    }
}

function setClassDisplay(label){
    let lists = document.getElementsByClassName("lists");
    let searchInputEl = document.getElementsByClassName("subnav-search-input")[0];

    if(!label){ label = "All"; }

    document.title=label+" - TriumphK Blog";
    searchInputEl.value=(label==="All" ? "" : label);
    resetSearchDecorations();

    if(label=="All"){
        for(let i = 0; i < lists.length; i++){
            lists[i].dataset.match = "1";
        }
        document.getElementsByClassName("notFind")[0].style.display='none';
        currentPage = 1;
        applyPagination();
    }
    else if(tagList.indexOf(label)!=-1){
        for(let i = 0; i < lists.length; i++){
            lists[i].dataset.match = "0";
        }

        let labels = document.getElementsByClassName(label);
        for(let i = 0; i < labels.length; i++){
            labels[i].dataset.match = "1";
        }
        document.getElementsByClassName("notFind")[0].style.display='none';
        currentPage = 1;
        applyPagination();
    }
    else{
        searchShow();
    }
}

function normalizeSearchText(text){
    return (text || "").toString().toLowerCase();
}

function escapeHtml(text){
    const span = document.createElement("span");
    span.textContent = (text || "").toString();
    return span.innerHTML;
}

function escapeRegExp(text){
    return (text || "").toString().replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
}

function highlightText(text, keyword){
    const raw = (text || "").toString();
    const key = (keyword || "").toString().trim();
    if(!key){ return escapeHtml(raw); }

    const reg = new RegExp("(" + escapeRegExp(key) + ")", "ig");
    return raw.split(reg).map(function(part, idx){
        if(idx % 2 === 1){
            return '<mark class="match-keyword">' + escapeHtml(part) + '</mark>';
        }
        return escapeHtml(part);
    }).join("");
}

function buildSnippetHtml(sourceText, keyword){
    const key = (keyword || "").toString().trim();
    const text = (sourceText || "").toString();
    if(!key || !text){ return ""; }

    const normalized = text.replace(/\r/g, "");
    const lines = normalized
        .split("\n")
        .map(function(line){ return line.trim(); })
        .filter(function(line){ return line.length > 0; });

    if(lines.length === 0){ return ""; }

    const lowKey = key.toLowerCase();
    let hitIndex = -1;
    for(let i = 0; i < lines.length; i++){
        if(lines[i].toLowerCase().indexOf(lowKey) !== -1){
            hitIndex = i;
            break;
        }
    }

    if(hitIndex === -1){ return ""; }

    const start = Math.max(0, hitIndex - 1);
    const end = Math.min(lines.length - 1, hitIndex + 1);
    const picked = [];
    for(let i = start; i <= end; i++){
        picked.push(highlightText(lines[i], key));
    }

    return picked.join("<br>");
}

function resetSearchDecorations(){
    let lists = document.getElementsByClassName("lists");
    for(let i = 0; i < lists.length; i++){
        const titleEl = lists[i].querySelector(".listTitle");
        const snippetEl = lists[i].querySelector(".listSnippet");
        if(titleEl){
            const rawTitle = titleEl.getAttribute("data-raw-title") || titleEl.textContent || "";
            titleEl.textContent = rawTitle;
        }
        if(snippetEl){
            snippetEl.textContent = "";
        }
    }
}

function extractTextFromHtml(html){
    try{
        const parser = new DOMParser();
        const doc = parser.parseFromString(html || "", "text/html");
        return normalizeSearchText(doc.body ? (doc.body.textContent || "") : "");
    }catch(e){
        return "";
    }
}

function extractRawTextFromHtml(html){
    try{
        const parser = new DOMParser();
        const doc = parser.parseFromString(html || "", "text/html");
        if(!doc.body){ return ""; }

        const blocks = doc.body.querySelectorAll("p,li,pre,blockquote,h1,h2,h3,h4,h5,h6,td,th,code");
        blocks.forEach(function(el){
            if(!el.getAttribute("data-kc-line-break")){
                el.insertAdjacentText("beforebegin", "\n");
                el.setAttribute("data-kc-line-break", "1");
            }
        });

        const raw = (doc.body.textContent || "")
            .replace(/\r/g, "")
            .replace(/\n{3,}/g, "\n\n");

        return raw.trim();
    }catch(e){
        return "";
    }
}

let searchRawMap={};

async function buildSearchIndex(){
    if(searchIndexReady){return;}
    if(searchIndexBuildingPromise){return searchIndexBuildingPromise;}

    searchIndexBuildingPromise = (async function(){
        let tasks = [];
        for(let key in jsonData){
            if(key === "labelColorDict"){continue;}
            const item = jsonData[key];
            const baseRaw = [
                item.postTitle || "",
                (item.labels || []).join(" "),
                item.createdDate || "",
                item.postUrl || ""
            ].join(" ").replace(/\s+/g, " ").trim();
            const baseText = normalizeSearchText(baseRaw);
            searchIndexMap[key] = baseText;
            searchRawMap[key] = baseRaw;

            tasks.push(
                fetch(item.postUrl, { cache: "no-store" })
                    .then(function(res){ return res.ok ? res.text() : ""; })
                    .then(function(html){
                        const pageText = extractTextFromHtml(html);
                        const pageRaw = extractRawTextFromHtml(html);
                        searchIndexMap[key] = (baseText + " " + pageText).trim();
                        searchRawMap[key] = (baseRaw + " " + pageRaw).trim();
                    })
                    .catch(function(){
                        searchIndexMap[key] = baseText;
                        searchRawMap[key] = baseRaw;
                    })
            );
        }
        await Promise.allSettled(tasks);
        searchIndexReady = true;
    })();

    return searchIndexBuildingPromise;
}

async function searchShow(){
    let lists = document.getElementsByClassName("lists");
    let searchInput = document.getElementsByClassName("subnav-search-input")[0].value;
    let searchText = normalizeSearchText(searchInput);
    if(searchInput==''){document.title="Search - TriumphK Blog";}
    else{document.title=searchInput+" - TriumphK Blog";}

    window.location.hash="#"+(searchInput);

    if(searchText !== ""){
        await buildSearchIndex();
    }

    let a=0;
    for(let i = 0; i < lists.length; i++){
        const postKey = lists[i].getAttribute("data-post-key");
        const indexText = searchIndexMap[postKey] || "";
        const rawText = searchRawMap[postKey] || "";
        const titleEl = lists[i].querySelector(".listTitle");
        const snippetEl = lists[i].querySelector(".listSnippet");
        const rawTitle = titleEl ? (titleEl.getAttribute("data-raw-title") || titleEl.textContent || "") : "";

        const isMatch = (searchText === "" || indexText.indexOf(searchText) !== -1);
        if(isMatch){
            lists[i].dataset.match = "1";
            a=a+1;
            if(titleEl){
                if(searchText === ""){
                    titleEl.textContent = rawTitle;
                }else{
                    titleEl.innerHTML = highlightText(rawTitle, searchInput);
                }
            }
            if(snippetEl){
                if(searchText === ""){
                    snippetEl.textContent = "";
                }else{
                    snippetEl.innerHTML = buildSnippetHtml(rawText, searchInput);
                }
            }
        }else{
            lists[i].dataset.match = "0";
            if(titleEl){ titleEl.textContent = rawTitle; }
            if(snippetEl){ snippetEl.textContent = ""; }
        }
    }

    currentPage = 1;
    applyPagination();

    if(a==0){
        let notFind=document.getElementsByClassName("notFind")[0];
        notFind.style.display='block';
        notFind.innerHTML='Not Find "'+searchInput+'"';
    }
    else{document.getElementsByClassName("notFind")[0].style.display='none';}
}
